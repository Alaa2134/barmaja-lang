<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملعب بَرمَجة - Barmaja Playground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Arial';
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .panel-content {
            flex: 1;
            padding: 20px;
            overflow: auto;
        }

        textarea {
            width: 100%;
            height: 400px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            direction: rtl;
            text-align: right;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        #output {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            min-height: 400px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            direction: ltr;
            text-align: left;
        }

        .output-line {
            padding: 5px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .output-line:last-child {
            border-bottom: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-run {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-run:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-clear {
            background: #f44336;
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-clear:hover {
            background: #da190b;
            transform: translateY(-2px);
        }

        .btn-copy {
            background: #2196F3;
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-copy:hover {
            background: #0b7dda;
            transform: translateY(-2px);
        }

        .examples {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 20px;
            margin-bottom: 20px;
        }

        .examples h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .example-btn {
            display: inline-block;
            background: #f0f0f0;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #ddd;
        }

        .example-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .footer {
            text-align: center;
            color: white;
            padding: 20px;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            textarea, #output {
                height: 300px;
                max-height: 300px;
            }
        }

        .error {
            color: #f44336;
            padding: 10px;
            background: #ffebee;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .success {
            color: #4caf50;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 5px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌟 ملعب بَرمَجة 🌟</h1>
            <p>اكتب كودك بالعربية واشوف النتيجة فوراً</p>
        </div>

        <div class="examples">
            <h3>📚 أمثلة سريعة:</h3>
            <button class="example-btn" onclick="loadExample('hello')">مثال الترحيب</button>
            <button class="example-btn" onclick="loadExample('loop')">حلقة تكرار</button>
            <button class="example-btn" onclick="loadExample('function')">دالة بسيطة</button>
            <button class="example-btn" onclick="loadExample('class')">فئة (Class)</button>
            <button class="example-btn" onclick="loadExample('condition')">شروط</button>
        </div>

        <div class="main-content">
            <div class="panel">
                <div class="panel-header">📝 كود بَرمَجة</div>
                <div class="panel-content">
                    <textarea id="code" placeholder="اكتب كودك هنا...">دالة ترحيب(اسم) {
    أرجع 'مرحباً يا ' + اسم;
}

اطبع(ترحيب('علاء'));</textarea>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">💻 النتيجة</div>
                <div class="panel-content">
                    <div id="output"></div>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-run" onclick="runCode()">▶️ شغّل الكود</button>
            <button class="btn-copy" onclick="copyOutput()">📋 انسخ النتيجة</button>
            <button class="btn-clear" onclick="clearAll()">🗑️ امسح الكل</button>
        </div>

        <div class="footer">
            <p>🔧 صُنعت بـ ❤️ من قِبل <strong>علاء صابر</strong> | جميع الحقوق محفوظة © 2026</p>
        </div>
    </div>

    <script>
        // محرك التشغيل المدمج
        const keywordsMap = {
            'متغير': 'var',
            'دع': 'let',
            'ثابت': 'const',
            'دالة': 'function',
            'إذا': 'if',
            'وإلا': 'else',
            'لكل': 'for',
            'طالما': 'while',
            'أرجع': 'return',
            'صنف': 'class',
            'هذا': 'this',
            'جديد': 'new',
            'استورد': 'import',
            'صدر': 'export',
            'صحيح': 'true',
            'خطأ': 'false',
            'فارغ': 'null',
            'غير_معرف': 'undefined',
            'اطبع': 'console.log'
        };

        function transpile(code) {
            let transpiledCode = code;
            for (const [arabic, english] of Object.entries(keywordsMap)) {
                const regex = new RegExp(`(?<=^|[^\\p{L}\\p{N}_])${arabic}(?=[^\\p{L}\\p{N}_]|$)`, 'gu');
                transpiledCode = transpiledCode.replace(regex, english);
            }
            return transpiledCode;
        }

        function runCode() {
            const code = document.getElementById('code').value;
            const output = document.getElementById('output');
            output.innerHTML = '';

            try {
                const jsCode = transpile(code);
                
                // إعادة توجيه console.log
                const logs = [];
                const originalLog = console.log;
                console.log = function(...args) {
                    logs.push(args.map(arg => {
                        if (typeof arg === 'object') {
                            return JSON.stringify(arg, null, 2);
                        }
                        return String(arg);
                    }).join(' '));
                };

                // تنفيذ الكود
                eval(jsCode);

                // استعادة console.log
                console.log = originalLog;

                // عرض النتائج
                if (logs.length === 0) {
                    output.innerHTML = '<div class="success">✓ تم تنفيذ الكود بنجاح (بدون مخرجات)</div>';
                } else {
                    output.innerHTML = logs.map(log => `<div class="output-line">${log}</div>`).join('');
                }
            } catch (error) {
                output.innerHTML = `<div class="error">❌ خطأ: ${error.message}</div>`;
            }
        }

        function clearAll() {
            document.getElementById('code').value = '';
            document.getElementById('output').innerHTML = '';
        }

        function copyOutput() {
            const output = document.getElementById('output').innerText;
            navigator.clipboard.writeText(output).then(() => {
                alert('تم نسخ النتيجة!');
            });
        }

        const examples = {
            hello: `دالة ترحيب(اسم) {
    إذا (اسم === غير_معرف) {
        أرجع 'مرحباً بالعالم!';
    } وإلا {
        أرجع 'مرحباً يا ' + اسم;
    }
}

اطبع(ترحيب('علاء'));
اطبع(ترحيب());`,

            loop: `اطبع('--- حلقة تكرار ---');
لكل (دع i = 1; i <= 5; i++) {
    اطبع('الرقم: ' + i);
}

اطبع('');
اطبع('--- حلقة طالما ---');
دع عداد = 0;
طالما (عداد < 3) {
    اطبع('العداد: ' + عداد);
    عداد++;
}`,

            function: `دالة جمع(أ, ب) {
    أرجع أ + ب;
}

دالة طرح(أ, ب) {
    أرجع أ - ب;
}

اطبع('جمع 10 + 5 = ' + جمع(10, 5));
اطبع('طرح 10 - 5 = ' + طرح(10, 5));`,

            class: `صنف سيارة {
    جديد(ماركة, لون) {
        هذا.ماركة = ماركة;
        هذا.لون = لون;
    }

    دالة وصف() {
        أرجع 'سيارة ' + هذا.ماركة + ' باللون ' + هذا.لون;
    }
}

دع سيارتي = جديد سيارة('تويوتا', 'أحمر');
اطبع(سيارتي.وصف());`,

            condition: `دع درجة = 85;

إذا (درجة >= 90) {
    اطبع('التقدير: ممتاز');
} وإلا إذا (درجة >= 80) {
    اطبع('التقدير: جيد جداً');
} وإلا إذا (درجة >= 70) {
    اطبع('التقدير: جيد');
} وإلا {
    اطبع('التقدير: ضعيف');
}`
        };

        function loadExample(name) {
            document.getElementById('code').value = examples[name];
            runCode();
        }

        // تشغيل المثال الأول تلقائياً
        window.addEventListener('load', () => {
            runCode();
        });
    </script>
</body>
</html>
